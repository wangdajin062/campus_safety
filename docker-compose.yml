version: "3.9"

# ═══════════════════════════════════════════════════════════
# 校园安全 APP v3 — 软硬协同多模态推测解码部署配置
# ═══════════════════════════════════════════════════════════

services:

  # ── FastAPI 主服务 ──────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: campus-safety-api:v3
    container_name: campus_safety_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:    postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/campus_safety
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY:      ${SECRET_KEY}
      SMS_ACCESS_KEY:  ${SMS_ACCESS_KEY}
      SMS_SECRET_KEY:  ${SMS_SECRET_KEY}
      SMS_SIGN_NAME:   ${SMS_SIGN_NAME}
      SMS_TEMPLATE_CODE: ${SMS_TEMPLATE_CODE}
      FCM_SERVER_KEY:  ${FCM_SERVER_KEY}
      APP_ENV:         production
      ALLOWED_ORIGINS: '["https://campus-safety.com"]'
      # v3 推测解码配置
      DRAFT_MODEL_PATH: /models/fraud_draft_q4km.gguf
      VERIFY_MODEL_URL: http://llm-server:8001
      GAMMA:           5
    volumes:
      - ./backend:/app
      - model_cache:/models       # GGUF 模型持久化
      - ml_feedback:/app/ml/models  # 反馈样本持久化
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4g

  # ── PostgreSQL 数据库 ────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: campus_safety_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       campus_safety
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema_postgresql.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campus_safety"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g

  # ── Redis 缓存 ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: campus_safety_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Nginx 反向代理 + HTTPS ──────────────────────────────
  nginx:
    image: nginx:1.26-alpine
    container_name: campus_safety_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s

  # ── LLM 推理服务（主模型 + 推测解码）────────────────────
  # 注：需要 GPU 节点，CPU 部署时注释掉此服务
  llm-server:
    image: vllm/vllm-openai:v0.5.3
    container_name: campus_safety_llm
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
    volumes:
      - model_cache:/root/.cache/huggingface
    command: >
      python -m vllm.entrypoints.openai.api_server
        --model Qwen/Qwen2.5-7B-Instruct
        --speculative-model /models/fraud_draft_q4km.gguf
        --num-speculative-tokens 5
        --port 8001
        --max-model-len 2048
        --gpu-memory-utilization 0.85
        --disable-log-requests
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu    # docker-compose --profile gpu up 启用 GPU 推理

volumes:
  postgres_data:
  redis_data:
  model_cache:     # 共享模型缓存（API + LLM server）
  ml_feedback:     # ML 反馈样本持久化
  nginx_logs:

networks:
  default:
    name: campus_safety_net
    driver: bridge
