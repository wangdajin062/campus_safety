version: "3.9"

# ═══════════════════════════════════════════════════════════
# QAD-MultiGuard — Base Docker Compose
#
# Development:  docker compose up -d
# Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# With GPU:     docker compose --profile gpu -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════

services:

  # ── FastAPI Backend ────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: campus-safety-api:v3
    container_name: campus_safety_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:    postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/campus_safety
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY:      ${SECRET_KEY}
      SMS_ACCESS_KEY:  ${SMS_ACCESS_KEY}
      SMS_SECRET_KEY:  ${SMS_SECRET_KEY}
      SMS_SIGN_NAME:   ${SMS_SIGN_NAME}
      SMS_TEMPLATE_CODE: ${SMS_TEMPLATE_CODE}
      FCM_SERVER_KEY:  ${FCM_SERVER_KEY}
      APP_ENV:         development
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
      DRAFT_MODEL_PATH: /models/fraud_draft_q4km.gguf
      VERIFY_MODEL_URL: http://llm-server:8001
      GAMMA:           5
    volumes:
      - ./backend:/app
      - model_cache:/models
      - ml_feedback:/app/ml/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── PostgreSQL ─────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: campus_safety_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       campus_safety
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema_postgresql.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campus_safety"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: campus_safety_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Nginx Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:1.26-alpine
    container_name: campus_safety_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── LLM Inference Server (GPU only) ───────────────────
  llm-server:
    image: vllm/vllm-openai:v0.5.3
    container_name: campus_safety_llm
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
    volumes:
      - model_cache:/root/.cache/huggingface
    command: >
      python -m vllm.entrypoints.openai.api_server
        --model Qwen/Qwen2.5-7B-Instruct
        --speculative-model /models/fraud_draft_q4km.gguf
        --num-speculative-tokens 5
        --port 8001
        --max-model-len 2048
        --gpu-memory-utilization 0.85
        --disable-log-requests
    profiles:
      - gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  postgres_data:
  redis_data:
  model_cache:
  ml_feedback:
  nginx_logs:

networks:
  default:
    name: campus_safety_net
    driver: bridge
