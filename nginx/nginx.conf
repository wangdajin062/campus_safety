worker_processes auto;
events { worker_connections 1024; use epoll; }

http {
    # ── 基础安全头 ─────────────────────────────────────────────
    add_header X-Frame-Options          SAMEORIGIN;
    add_header X-Content-Type-Options   nosniff;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Referrer-Policy          "strict-origin-when-cross-origin";
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()";
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; object-src 'none'";

    # ── 速率限制 ─────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api_global:10m  rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=api_auth:10m    rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # HTTP → HTTPS 重定向
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS 主服务
    server {
        listen 443 ssl http2;
        server_name campus-safety.com www.campus-safety.com;

        # SSL
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # 上游 FastAPI
        upstream api_backend {
            server api:8000;
            keepalive 32;
        }

        # 全局速率限制
        limit_req  zone=api_global burst=50 nodelay;
        limit_conn conn_limit 20;

        # ── API 代理 ──────────────────────────────────────────
        location /v1/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   Connection         "";
            proxy_read_timeout 60s;

            # 严格限制认证端点
            location ~ ^/v1/auth/(send-code|login) {
                limit_req zone=api_auth burst=3 nodelay;
                proxy_pass http://api_backend;
            }
        }

        # ── SSE 流式端点（特殊配置）──────────────────────────
        location /v1/infer/stream {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection         "";
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;   # SSE 需要长连接
            chunked_transfer_encoding on;
        }

        # ── 健康检查 ──────────────────────────────────────────
        location /health {
            proxy_pass http://api_backend;
            access_log off;
        }

        # ── API 文档（生产环境可关闭）─────────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://api_backend;
            # 生产环境取消注释以禁用文档:
            # return 404;
        }

        # 隐藏服务器信息
        server_tokens off;
        client_max_body_size 5m;
    }
}
