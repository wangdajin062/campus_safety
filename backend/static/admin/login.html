<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理登录 — QAD-MultiGuard v4.1</title>
<link rel="stylesheet" href="/static/admin/css/admin.css">
</head>
<body class="login-page">

<div class="login-card">
  <h2>QAD-MultiGuard 管理看板</h2>
  <p class="subtitle">校园安全 v4.1 · 软硬协同多模态检测</p>

  <div class="form-group">
    <label>手机号</label>
    <input type="tel" id="phone" class="form-control" placeholder="请输入手机号" maxlength="11" autocomplete="tel">
  </div>

  <div class="form-group code-row">
    <label style="flex:1">
      验证码
      <input type="text" id="code" class="form-control" placeholder="6位验证码" maxlength="6" autocomplete="one-time-code">
    </label>
    <div style="display:flex;align-items:flex-end;padding-bottom:1px;">
      <button id="sendCodeBtn" class="btn btn-outline" onclick="sendCode()">发送验证码</button>
    </div>
  </div>

  <button class="btn btn-primary btn-full" onclick="doLogin()" style="margin-top:8px;">登 录</button>
  <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-secondary);">
    开发模式：万能验证码 <b>888888</b>
  </p>
</div>

<script src="/static/admin/js/admin.js"></script>
<script>
let countdown = 0;

async function sendCode() {
  const phone = document.getElementById('phone').value;
  if (!/^1[3-9]\d{9}$/.test(phone)) {
    showToast('请输入正确的手机号', 'error');
    return;
  }
  if (countdown > 0) return;

  try {
    const res = await fetch('/v1/auth/send-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '发送失败');
    }
    showToast('验证码已发送（开发模式查看服务器日志）', 'success');
    countdown = 60;
    updateCountdown();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

function updateCountdown() {
  const btn = document.getElementById('sendCodeBtn');
  if (countdown > 0) {
    btn.textContent = countdown + 's';
    btn.disabled = true;
    countdown--;
    setTimeout(updateCountdown, 1000);
  } else {
    btn.textContent = '发送验证码';
    btn.disabled = false;
  }
}

async function doLogin() {
  const phone = document.getElementById('phone').value;
  const code = document.getElementById('code').value;
  if (!phone || !code) {
    showToast('请填写手机号和验证码', 'error');
    return;
  }

  try {
    const res = await fetch('/admin/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ phone, code }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '登录失败');
    showToast('登录成功，正在跳转...', 'success');
    setTimeout(() => { location.href = '/admin/dashboard'; }, 500);
  } catch (e) {
    showToast(e.message, 'error');
  }
}

document.getElementById('phone').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('code').focus();
});
document.getElementById('code').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
