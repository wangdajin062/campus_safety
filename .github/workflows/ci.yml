name: QAD-MultiGuard CI

on:
  push:
    branches: [main, dev, 'v4.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        uses: chartboost/ruff-action@v1
        with:
          src: backend/

      - name: Run unit tests
        working-directory: ./backend
        run: |
          python -m pytest tests/ -v --tb=short -q
        env:
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: test

      - name: Run v4.1 feature tests
        working-directory: ./backend
        run: |
          python -m pytest tests/test_v41_features.py -v --tb=short
        env:
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: test

  check-android:
    name: Android Lint (Java)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Check Java syntax
        run: |
          find android/ -name "*.java" -exec javac -d /tmp/out -proc:none {} + 2>&1 | head -20 || echo "javac check skipped (non-Android env)"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t campus-safety-api:ci ./backend
